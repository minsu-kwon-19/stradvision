services:
  controller:
    build:
      context: ../..
      dockerfile: docker/test/controller-asan.Dockerfile
    ports:
      - "9000:9000"
      - "9090:9090"
    environment:
      - ASAN_OPTIONS=detect_leaks=1:symbolize=1
      - UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1
    networks:
      - sv_net

  agent-1:
    build:
      context: ../..
      dockerfile: docker/test/agent-asan.Dockerfile
    command: [ "controller", "9000", "1" ]
    depends_on:
      - controller
    environment:
      - ASAN_OPTIONS=detect_leaks=1:symbolize=1
      - UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1
    networks:
      - sv_net

  agent-2:
    build:
      context: ../..
      dockerfile: docker/test/agent-asan.Dockerfile
    command: [ "controller", "9000", "2" ]
    depends_on:
      - controller
    environment:
      - ASAN_OPTIONS=detect_leaks=1:symbolize=1
      - UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1
    networks:
      - sv_net

  agent-3:
    build:
      context: ../..
      dockerfile: docker/test/agent-asan.Dockerfile
    command: [ "controller", "9000", "3" ]
    depends_on:
      - controller
    environment:
      - ASAN_OPTIONS=detect_leaks=1:symbolize=1
      - UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1
    networks:
      - sv_net

networks:
  sv_net:
